<!doctype html>
<!--
  PROTOTYPE — Google ID Debugger UI exploration. THROWAWAY.
  Three variants switchable via ?variant=a|b|c.
  Logged-in/out switchable via ?state=in|out.
  Floating bottom bar cycles variants; ← / → keys also work.
  Tailwind v4 + Alpine via CDN here (real app uses compiled Tailwind v4 CLI per handoff).
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Google ID Debugger — prototype</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-mono: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace;
      }
    </style>
  </head>
  <body class="bg-zinc-50 text-zinc-900 dark:bg-zinc-950 dark:text-zinc-100 antialiased">
    <script>
      // Shared mock claims
      window.CLAIMS = {
        sub: "117812345678901234567",
        email: "jane.doe@example.com",
        email_verified: true,
        name: "Jane Doe",
        given_name: "Jane",
        family_name: "Doe",
        picture: "https://lh3.googleusercontent.com/a/default-user=s96-c",
        locale: "en-GB",
        hd: "example.com",
        iss: "https://accounts.google.com",
        aud: "123456789.apps.googleusercontent.com",
        azp: "123456789.apps.googleusercontent.com",
        iat: 1747654320,
      };

      function avatarColor(seed) {
        let h = 0;
        for (const c of seed) h = (h * 31 + c.charCodeAt(0)) >>> 0;
        return `hsl(${h % 360} 65% 45%)`;
      }

      function initials(name) {
        return name
          .split(/\s+/)
          .filter(Boolean)
          .map((p) => p[0])
          .slice(0, 2)
          .join("")
          .toUpperCase();
      }

      function debuggerData() {
        return {
          c: window.CLAIMS,
          debugOpen: false,
          copied: null,
          imgFailed: false,
          async copy(value, key = "default") {
            try {
              await navigator.clipboard.writeText(value);
              this.copied = key;
              setTimeout(() => {
                if (this.copied === key) this.copied = null;
              }, 1500);
            } catch (e) {
              console.error(e);
            }
          },
          copyJson() {
            this.copy(JSON.stringify(this.c, null, 2), "json");
          },
          get initials() {
            return initials(this.c.name || this.c.email || "?");
          },
          get avatarBg() {
            return avatarColor(this.c.sub || this.c.email || "x");
          },
          get iatHuman() {
            return new Date(this.c.iat * 1000).toISOString().replace("T", " ").replace(".000Z", " UTC");
          },
        };
      }

      // Variant + state from URL
      const params = new URLSearchParams(location.search);
      window.currentVariant = (params.get("variant") || "a").toLowerCase();
      window.currentState = (params.get("state") || "in").toLowerCase();
      if (!["a", "b", "c"].includes(window.currentVariant)) window.currentVariant = "a";
      if (!["in", "out"].includes(window.currentState)) window.currentState = "in";

      function setParam(key, value) {
        const p = new URLSearchParams(location.search);
        p.set(key, value);
        location.search = p.toString();
      }
      function cycleVariant(dir) {
        const order = ["a", "b", "c"];
        const i = order.indexOf(window.currentVariant);
        const next = order[(i + dir + order.length) % order.length];
        setParam("variant", next);
      }
      document.addEventListener("keydown", (e) => {
        const t = e.target;
        if (t && (t.matches("input,textarea,[contenteditable]") || t.isContentEditable)) return;
        if (e.key === "ArrowLeft") cycleVariant(-1);
        if (e.key === "ArrowRight") cycleVariant(1);
      });
    </script>

    <!-- Google SVG (used by sign-in button) -->
    <template id="google-g">
      <svg viewBox="0 0 18 18" class="h-5 w-5" aria-hidden="true">
        <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.91c1.7-1.57 2.69-3.88 2.69-6.62z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.91-2.26c-.8.54-1.83.86-3.05.86-2.34 0-4.33-1.58-5.04-3.71H.96v2.33A9 9 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.96 10.71A5.41 5.41 0 0 1 3.68 9c0-.59.1-1.17.28-1.71V4.96H.96A9 9 0 0 0 0 9c0 1.45.35 2.82.96 4.04l3-2.33z"/>
        <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58A9 9 0 0 0 .96 4.96l3 2.33C4.67 5.16 6.66 3.58 9 3.58z"/>
      </svg>
    </template>

    <main x-data id="root">
      <!-- Render the right variant based on URL -->
      <template x-if="window.currentState === 'out' && window.currentVariant === 'a'"><div id="va-out"></div></template>
      <template x-if="window.currentState === 'out' && window.currentVariant === 'b'"><div id="vb-out"></div></template>
      <template x-if="window.currentState === 'out' && window.currentVariant === 'c'"><div id="vc-out"></div></template>
      <template x-if="window.currentState === 'in' && window.currentVariant === 'a'"><div id="va"></div></template>
      <template x-if="window.currentState === 'in' && window.currentVariant === 'b'"><div id="vb"></div></template>
      <template x-if="window.currentState === 'in' && window.currentVariant === 'c'"><div id="vc"></div></template>
    </main>

    <!-- ============================================================ -->
    <!-- VARIANT A — Classic centered card                              -->
    <!-- ============================================================ -->
    <template id="tpl-va">
      <div x-data="debuggerData()" class="min-h-screen flex items-center justify-center px-4 py-12 bg-zinc-100 dark:bg-zinc-950">
        <div class="w-full max-w-[480px] bg-white dark:bg-zinc-900 rounded-2xl shadow-sm border border-zinc-200 dark:border-zinc-800 p-8">
          <!-- Avatar -->
          <div class="flex flex-col items-center text-center">
            <template x-if="!imgFailed && c.picture">
              <img :src="c.picture" @error="imgFailed = true" alt="" class="h-20 w-20 rounded-full object-cover ring-2 ring-zinc-200 dark:ring-zinc-700" />
            </template>
            <template x-if="imgFailed || !c.picture">
              <div class="h-20 w-20 rounded-full flex items-center justify-center text-2xl font-semibold text-white" :style="`background:${avatarBg}`" x-text="initials"></div>
            </template>
            <h1 class="mt-4 text-xl font-semibold" x-text="c.name"></h1>
            <p class="text-sm text-zinc-500 dark:text-zinc-400 flex items-center gap-1.5 mt-0.5">
              <span x-text="c.email"></span>
              <svg x-show="c.email_verified" class="h-4 w-4 text-emerald-500" fill="currentColor" viewBox="0 0 20 20"><path d="M16.7 5.3a1 1 0 0 1 0 1.4l-7.5 7.5a1 1 0 0 1-1.4 0L3.3 9.7a1 1 0 1 1 1.4-1.4L8.5 12l6.8-6.7a1 1 0 0 1 1.4 0z"/></svg>
            </p>
          </div>

          <!-- SUB — hero -->
          <div class="mt-6">
            <div class="text-[11px] uppercase tracking-wider text-zinc-500 dark:text-zinc-400 font-medium mb-1.5">Google ID (sub)</div>
            <button @click="copy(c.sub, 'sub')" class="group w-full flex items-center justify-between gap-2 px-3 py-2.5 rounded-lg border-2 border-dashed border-zinc-300 dark:border-zinc-700 hover:border-blue-500 dark:hover:border-blue-400 transition text-left">
              <span class="font-mono text-sm break-all" x-text="c.sub"></span>
              <span class="shrink-0 text-xs font-medium" :class="copied === 'sub' ? 'text-emerald-600 dark:text-emerald-400' : 'text-zinc-400 group-hover:text-blue-600 dark:group-hover:text-blue-400'" x-text="copied === 'sub' ? '✓ Copied' : 'Copy'"></span>
            </button>
          </div>

          <!-- Main details -->
          <dl class="mt-6 space-y-2 text-sm">
            <div class="flex justify-between gap-4">
              <dt class="text-zinc-500 dark:text-zinc-400">Workspace</dt>
              <dd class="font-mono text-zinc-900 dark:text-zinc-100" x-text="c.hd || '—'"></dd>
            </div>
            <div class="flex justify-between gap-4">
              <dt class="text-zinc-500 dark:text-zinc-400">Locale</dt>
              <dd class="font-mono text-zinc-900 dark:text-zinc-100" x-text="c.locale || '—'"></dd>
            </div>
            <div class="flex justify-between gap-4">
              <dt class="text-zinc-500 dark:text-zinc-400">Issued at</dt>
              <dd class="font-mono text-zinc-900 dark:text-zinc-100 text-xs" x-text="iatHuman"></dd>
            </div>
          </dl>

          <!-- Copy JSON -->
          <button @click="copyJson()" class="mt-6 w-full px-3 py-2 rounded-lg bg-zinc-900 dark:bg-zinc-100 text-zinc-50 dark:text-zinc-900 text-sm font-medium hover:opacity-90 transition">
            <span x-text="copied === 'json' ? '✓ JSON copied' : 'Copy all claims as JSON'"></span>
          </button>

          <!-- Debug accordion (collapsed default) -->
          <div class="mt-4 border-t border-zinc-200 dark:border-zinc-800 pt-4">
            <button @click="debugOpen = !debugOpen" class="w-full flex items-center justify-between text-sm text-zinc-600 dark:text-zinc-300 hover:text-zinc-900 dark:hover:text-zinc-100">
              <span class="font-medium">Token claims</span>
              <svg class="h-4 w-4 transition-transform" :class="debugOpen && 'rotate-180'" fill="none" stroke="currentColor" viewBox="0 0 20 20"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 8l4 4 4-4"/></svg>
            </button>
            <div x-show="debugOpen" x-transition class="mt-3 space-y-1.5 text-xs font-mono">
              <template x-for="k in ['iss','aud','azp','iat']" :key="k">
                <div class="flex gap-2">
                  <span class="text-zinc-500 w-10 shrink-0" x-text="k"></span>
                  <span class="text-zinc-800 dark:text-zinc-200 break-all" x-text="c[k]"></span>
                </div>
              </template>
            </div>
          </div>

          <!-- Logout -->
          <form method="POST" action="/logout" @submit.prevent class="mt-6 text-center">
            <button class="text-xs text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-100 underline underline-offset-2">Sign out</button>
          </form>
        </div>
      </div>
    </template>

    <!-- ============================================================ -->
    <!-- VARIANT B — Two-column dashboard                              -->
    <!-- ============================================================ -->
    <template id="tpl-vb">
      <div x-data="debuggerData()" class="min-h-screen bg-zinc-50 dark:bg-zinc-950">
        <!-- SUB banner across top -->
        <div class="bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-700 dark:to-indigo-800 text-white">
          <div class="max-w-6xl mx-auto px-6 py-6">
            <div class="text-[11px] uppercase tracking-widest text-blue-100/80 font-semibold mb-2">Google sub claim</div>
            <div class="flex items-center gap-3">
              <code class="font-mono text-2xl md:text-3xl font-bold break-all" x-text="c.sub"></code>
              <button @click="copy(c.sub, 'sub')" class="shrink-0 px-3 py-1.5 rounded-md bg-white/15 hover:bg-white/25 text-sm font-medium backdrop-blur transition">
                <span x-text="copied === 'sub' ? '✓ Copied' : 'Copy'"></span>
              </button>
            </div>
          </div>
        </div>

        <div class="max-w-6xl mx-auto px-6 py-8 grid md:grid-cols-[280px_1fr] gap-8">
          <!-- Left rail: identity -->
          <aside class="space-y-4">
            <div class="bg-white dark:bg-zinc-900 rounded-xl border border-zinc-200 dark:border-zinc-800 p-5">
              <template x-if="!imgFailed && c.picture">
                <img :src="c.picture" @error="imgFailed = true" alt="" class="h-16 w-16 rounded-full mb-3 object-cover" />
              </template>
              <template x-if="imgFailed || !c.picture">
                <div class="h-16 w-16 rounded-full mb-3 flex items-center justify-center text-xl font-semibold text-white" :style="`background:${avatarBg}`" x-text="initials"></div>
              </template>
              <div class="font-semibold" x-text="c.name"></div>
              <div class="text-sm text-zinc-500 dark:text-zinc-400 break-all" x-text="c.email"></div>
              <div x-show="c.email_verified" class="mt-2 inline-flex items-center gap-1 text-xs text-emerald-700 dark:text-emerald-400 bg-emerald-50 dark:bg-emerald-950/50 px-2 py-0.5 rounded-full">
                <svg class="h-3 w-3" fill="currentColor" viewBox="0 0 20 20"><path d="M16.7 5.3a1 1 0 0 1 0 1.4l-7.5 7.5a1 1 0 0 1-1.4 0L3.3 9.7a1 1 0 1 1 1.4-1.4L8.5 12l6.8-6.7a1 1 0 0 1 1.4 0z"/></svg>
                Verified
              </div>
              <dl class="mt-4 pt-4 border-t border-zinc-200 dark:border-zinc-800 space-y-1.5 text-xs">
                <div class="flex justify-between"><dt class="text-zinc-500">Given</dt><dd x-text="c.given_name"></dd></div>
                <div class="flex justify-between"><dt class="text-zinc-500">Family</dt><dd x-text="c.family_name"></dd></div>
                <div class="flex justify-between"><dt class="text-zinc-500">Workspace</dt><dd class="font-mono" x-text="c.hd || '—'"></dd></div>
                <div class="flex justify-between"><dt class="text-zinc-500">Locale</dt><dd class="font-mono" x-text="c.locale || '—'"></dd></div>
              </dl>
            </div>
            <form method="POST" action="/logout" @submit.prevent>
              <button class="w-full text-xs text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-100 py-2 border border-zinc-200 dark:border-zinc-800 rounded-md">Sign out</button>
            </form>
          </aside>

          <!-- Right: claims table -->
          <section>
            <div class="flex items-center justify-between mb-3">
              <h2 class="font-semibold">All claims</h2>
              <button @click="copyJson()" class="text-sm px-3 py-1.5 rounded-md bg-zinc-900 dark:bg-zinc-100 text-zinc-50 dark:text-zinc-900 font-medium hover:opacity-90">
                <span x-text="copied === 'json' ? '✓ JSON copied' : 'Copy JSON'"></span>
              </button>
            </div>

            <div class="bg-white dark:bg-zinc-900 rounded-xl border border-zinc-200 dark:border-zinc-800 overflow-hidden">
              <table class="w-full text-sm">
                <tbody class="divide-y divide-zinc-100 dark:divide-zinc-800">
                  <template x-for="k in ['sub','email','email_verified','name','given_name','family_name','picture','locale','hd']" :key="k">
                    <tr class="hover:bg-zinc-50 dark:hover:bg-zinc-800/50">
                      <td class="px-4 py-2.5 text-zinc-500 dark:text-zinc-400 font-mono text-xs w-40 align-top" x-text="k"></td>
                      <td class="px-4 py-2.5 font-mono text-xs break-all" x-text="String(c[k])"></td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>

            <!-- Debug accordion (collapsed default) -->
            <div class="mt-4">
              <button @click="debugOpen = !debugOpen" class="w-full bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl px-4 py-3 flex items-center justify-between text-sm hover:bg-zinc-50 dark:hover:bg-zinc-800/50">
                <span class="font-medium">Token metadata (iss, aud, azp, iat)</span>
                <svg class="h-4 w-4 transition-transform" :class="debugOpen && 'rotate-180'" fill="none" stroke="currentColor" viewBox="0 0 20 20"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 8l4 4 4-4"/></svg>
              </button>
              <div x-show="debugOpen" x-transition class="bg-white dark:bg-zinc-900 border-x border-b border-zinc-200 dark:border-zinc-800 rounded-b-xl -mt-px">
                <table class="w-full text-sm">
                  <tbody class="divide-y divide-zinc-100 dark:divide-zinc-800">
                    <template x-for="k in ['iss','aud','azp','iat']" :key="k">
                      <tr>
                        <td class="px-4 py-2.5 text-zinc-500 font-mono text-xs w-40 align-top" x-text="k"></td>
                        <td class="px-4 py-2.5 font-mono text-xs break-all" x-text="k === 'iat' ? `${c[k]} (${iatHuman})` : c[k]"></td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
            </div>
          </section>
        </div>
      </div>
    </template>

    <!-- ============================================================ -->
    <!-- VARIANT C — Terminal / inspector                              -->
    <!-- ============================================================ -->
    <template id="tpl-vc">
      <div x-data="debuggerData()" class="min-h-screen bg-zinc-950 text-emerald-300 font-mono">
        <div class="max-w-3xl mx-auto px-4 py-8">
          <!-- Header line -->
          <div class="text-xs text-zinc-500 mb-6">
            <span class="text-emerald-500">$</span> google-id --inspect
            <span class="text-zinc-600">// staff support tool</span>
          </div>

          <!-- Avatar + identity row -->
          <div class="flex items-center gap-4 mb-8 pb-6 border-b border-zinc-800">
            <template x-if="!imgFailed && c.picture">
              <img :src="c.picture" @error="imgFailed = true" alt="" class="h-14 w-14 rounded object-cover ring-1 ring-zinc-700" />
            </template>
            <template x-if="imgFailed || !c.picture">
              <div class="h-14 w-14 rounded flex items-center justify-center text-lg font-bold text-zinc-950" :style="`background:${avatarBg}`" x-text="initials"></div>
            </template>
            <div class="text-sm">
              <div class="text-zinc-100"><span class="text-zinc-500">name=</span><span x-text="`&quot;${c.name}&quot;`"></span></div>
              <div class="text-zinc-300"><span class="text-zinc-500">email=</span><span x-text="`&quot;${c.email}&quot;`"></span> <span class="text-emerald-500" x-show="c.email_verified">[verified]</span></div>
              <div class="text-zinc-400 text-xs"><span class="text-zinc-500">hd=</span><span x-text="c.hd || 'null'"></span> <span class="text-zinc-500">locale=</span><span x-text="c.locale || 'null'"></span></div>
            </div>
          </div>

          <!-- SUB shell-prompt copy field -->
          <div class="mb-8">
            <div class="text-xs text-zinc-500 mb-2"># Google subject identifier — stable, never reused</div>
            <div class="bg-zinc-900 border border-emerald-700/40 rounded p-4 flex items-start gap-3">
              <span class="text-emerald-500 select-none shrink-0">❯</span>
              <code class="text-emerald-300 text-base break-all flex-1" x-text="c.sub"></code>
              <button @click="copy(c.sub, 'sub')" class="shrink-0 text-xs px-2 py-1 border border-emerald-700/60 text-emerald-300 hover:bg-emerald-900/30 rounded">
                <span x-text="copied === 'sub' ? '✓' : 'copy'"></span>
              </button>
            </div>
          </div>

          <!-- Actions -->
          <div class="flex gap-2 mb-6 text-xs">
            <button @click="copyJson()" class="px-3 py-1.5 border border-zinc-700 hover:border-emerald-600 text-zinc-300 hover:text-emerald-300 rounded">
              <span x-text="copied === 'json' ? '✓ json copied' : 'copy --json'"></span>
            </button>
            <button @click="debugOpen = !debugOpen" class="px-3 py-1.5 border border-zinc-700 hover:border-emerald-600 text-zinc-300 hover:text-emerald-300 rounded">
              <span x-text="debugOpen ? 'hide --meta' : 'show --meta'"></span>
            </button>
            <form method="POST" action="/logout" @submit.prevent class="ml-auto">
              <button class="px-3 py-1.5 text-zinc-500 hover:text-red-400">logout</button>
            </form>
          </div>

          <!-- JSON view of claims -->
          <div class="bg-zinc-900/50 border border-zinc-800 rounded p-4 text-xs leading-relaxed overflow-x-auto">
            <div><span class="text-zinc-500">{</span></div>
            <template x-for="(k, idx) in ['sub','email','email_verified','name','given_name','family_name','picture','locale','hd']" :key="k">
              <div class="pl-4">
                <span class="text-sky-300" x-text="`&quot;${k}&quot;`"></span><span class="text-zinc-500">: </span><span :class="typeof c[k] === 'boolean' ? 'text-amber-300' : 'text-emerald-300'" x-text="JSON.stringify(c[k])"></span><span class="text-zinc-500">,</span>
              </div>
            </template>
            <!-- Debug rows -->
            <template x-if="debugOpen">
              <div>
                <template x-for="k in ['iss','aud','azp','iat']" :key="k">
                  <div class="pl-4 bg-zinc-800/40">
                    <span class="text-purple-300" x-text="`&quot;${k}&quot;`"></span><span class="text-zinc-500">: </span><span :class="typeof c[k] === 'number' ? 'text-amber-300' : 'text-emerald-300'" x-text="JSON.stringify(c[k])"></span><span class="text-zinc-500">,</span>
                    <template x-if="k === 'iat'"><span class="text-zinc-600 ml-2" x-text="`// ${iatHuman}`"></span></template>
                  </div>
                </template>
              </div>
            </template>
            <div x-show="!debugOpen" class="pl-4 text-zinc-600 italic">// 4 metadata claims hidden — click show --meta</div>
            <div><span class="text-zinc-500">}</span></div>
          </div>
        </div>
      </div>
    </template>

    <!-- ============================================================ -->
    <!-- LOGGED-OUT views                                              -->
    <!-- ============================================================ -->
    <template id="tpl-va-out">
      <div class="min-h-screen flex items-center justify-center px-4 py-12 bg-zinc-100 dark:bg-zinc-950">
        <div class="w-full max-w-[420px] bg-white dark:bg-zinc-900 rounded-2xl shadow-sm border border-zinc-200 dark:border-zinc-800 p-8 text-center">
          <div class="mx-auto h-12 w-12 rounded-full bg-blue-50 dark:bg-blue-950 flex items-center justify-center mb-4">
            <svg class="h-6 w-6 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          </div>
          <h1 class="text-xl font-semibold">Google ID Debugger</h1>
          <p class="text-sm text-zinc-500 dark:text-zinc-400 mt-1">Sign in to view your Google sub claim.</p>
          <a href="/auth/google" class="mt-6 inline-flex items-center justify-center gap-3 w-full bg-white dark:bg-zinc-100 border border-zinc-300 dark:border-zinc-300 rounded-md px-4 py-2.5 text-sm font-medium text-zinc-900 hover:bg-zinc-50 transition shadow-sm">
            <span data-google-g></span>
            Sign in with Google
          </a>
        </div>
      </div>
    </template>

    <template id="tpl-vb-out">
      <div class="min-h-screen bg-zinc-50 dark:bg-zinc-950 flex flex-col">
        <div class="bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-700 dark:to-indigo-800 text-white py-12 px-6">
          <div class="max-w-6xl mx-auto">
            <div class="text-[11px] uppercase tracking-widest text-blue-100/80 font-semibold mb-2">Internal</div>
            <h1 class="text-3xl font-bold">Google ID Debugger</h1>
            <p class="text-blue-100 mt-2 max-w-prose">Sign in to retrieve your stable Google subject identifier — used by support to relink broken SSO accounts.</p>
          </div>
        </div>
        <div class="flex-1 flex items-center justify-center px-6 py-12">
          <a href="/auth/google" class="inline-flex items-center justify-center gap-3 bg-white dark:bg-zinc-100 border border-zinc-300 rounded-md px-6 py-3 text-base font-medium text-zinc-900 hover:bg-zinc-50 transition shadow-md">
            <span data-google-g></span>
            Sign in with Google
          </a>
        </div>
      </div>
    </template>

    <template id="tpl-vc-out">
      <div class="min-h-screen bg-zinc-950 text-emerald-300 font-mono flex items-center justify-center px-4">
        <div class="max-w-md w-full">
          <pre class="text-xs text-zinc-500 mb-4">$ google-id --inspect
ERROR: not authenticated
HINT:  run `auth login` to continue</pre>
          <a href="/auth/google" class="inline-flex items-center justify-center gap-3 w-full bg-zinc-900 border border-emerald-700/60 hover:border-emerald-500 text-emerald-300 hover:bg-emerald-900/20 px-4 py-3 rounded text-sm transition">
            <span data-google-g></span>
            <span>auth login --provider google</span>
          </a>
        </div>
      </div>
    </template>

    <!-- ============================================================ -->
    <!-- Floating switcher (hidden in prod build — this is prototype)  -->
    <!-- ============================================================ -->
    <div class="fixed bottom-4 left-1/2 -translate-x-1/2 z-50 flex items-center gap-1 bg-zinc-900 text-zinc-100 rounded-full shadow-2xl border border-zinc-700 px-1.5 py-1.5 backdrop-blur"
         style="font-family: ui-sans-serif, system-ui, sans-serif">
      <button onclick="cycleVariant(-1)" class="h-8 w-8 rounded-full hover:bg-zinc-800 flex items-center justify-center" aria-label="Previous variant">←</button>
      <div class="px-3 py-1 text-xs font-medium tabular-nums" id="switcher-label">…</div>
      <button onclick="cycleVariant(1)" class="h-8 w-8 rounded-full hover:bg-zinc-800 flex items-center justify-center" aria-label="Next variant">→</button>
      <div class="w-px h-5 bg-zinc-700 mx-1"></div>
      <button onclick="setParam('state', window.currentState === 'in' ? 'out' : 'in')" class="text-xs px-2.5 py-1 rounded-full hover:bg-zinc-800" id="state-toggle">…</button>
    </div>

    <script>
      // Mount the right template into the DOM so Alpine picks it up
      function mount() {
        const variant = window.currentVariant;
        const state = window.currentState;
        const id = state === "out" ? `tpl-v${variant}-out` : `tpl-v${variant}`;
        const tpl = document.getElementById(id);
        const slot = document.getElementById(state === "out" ? `v${variant}-out` : `v${variant}`);
        if (tpl && slot) slot.innerHTML = tpl.innerHTML;

        // Inject Google G svg wherever data-google-g sits
        const g = document.getElementById("google-g");
        document.querySelectorAll("[data-google-g]").forEach((el) => {
          el.innerHTML = g.innerHTML;
        });

        const labels = { a: "A — Classic card", b: "B — Dashboard", c: "C — Terminal" };
        document.getElementById("switcher-label").textContent = labels[variant];
        document.getElementById("state-toggle").textContent = state === "in" ? "logged in" : "logged out";
      }
      // Wait for Alpine to set up <template x-if> slots, then mount
      document.addEventListener("alpine:initialized", () => requestAnimationFrame(mount));
    </script>
  </body>
</html>
